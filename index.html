<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Premium Streaming Welt</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #e50914; /* Netflix Red für TCL Kontrast */
            --text-color: #ffffff;
            --card-width: 200px;
            --card-height: 300px;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow: hidden; /* Verhindert hässliche Scrollbars auf dem TV */
            display: flex;
        }

        /* Sidebar für TV Navigation */
        nav {
            width: 80px;
            height: 100vh;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 40px;
            border-right: 1px solid #222;
        }

        .nav-item {
            width: 50px;
            height: 50px;
            margin-bottom: 30px;
            border-radius: 50%;
            background: #333;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-item.active, .nav-item:focus {
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            outline: none;
        }

        /* Hauptbereich */
        main {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            height: 100vh;
        }

        h1 { font-size: 2.5rem; margin-bottom: 30px; }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-width), 1fr));
            gap: 25px;
        }

        /* Movie Card mit Fokus-Effekt für Fernbedienung */
        .movie-card {
            width: var(--card-width);
            height: var(--card-height);
            background: #222;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, border 0.3s;
            border: 3px solid transparent;
            cursor: pointer;
            position: relative;
        }

        .movie-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Der extrem wichtige Fokus-Status für TCL */
        .movie-card:focus {
            outline: none;
            transform: scale(1.1);
            border-color: var(--accent-color);
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.5);
            z-index: 10;
        }

        /* Player Overlay */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            z-index: 100;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer;
            z-index: 101;
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-item active" tabindex="1"></div>
        <div class="nav-item" tabindex="2"></div>
    </nav>

    <main>
        <h1>Meine 4K Auswahl</h1>
        <div class="movie-grid">
            <div class="movie-card" tabindex="3" onclick="playMovie('1078605')">
                <img src="https://image.tmdb.org/t/p/w500/iS9UpeR6T9R88T6A6vY8j9v8j.jpg" alt="Poster">
            </div>
            </div>
    </main>

    <div id="player-overlay">
        <button class="close-btn" onclick="closePlayer()">BEENDEN (BACK)</button>
        <iframe id="vidking-iframe" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
    </div>

    <script>
        function playMovie(tmdbId) {
            const player = document.getElementById('vidking-iframe');
            const overlay = document.getElementById('player-overlay');
            
            // Vidking URL mit deinen Parametern (TCL optimiert: Rot, Autoplay, TV Selector)
            player.src = `https://www.vidking.net/embed/movie/${tmdbId}?color=e50914&autoPlay=true`;
            
            overlay.style.display = 'block';
            player.focus();
        }

        function closePlayer() {
            const player = document.getElementById('vidking-iframe');
            const overlay = document.getElementById('player-overlay');
            player.src = ""; // Stop playback
            overlay.style.display = 'none';
        }

        // Steuerung für die Fernbedienung (D-Pad Unterstützung)
        document.addEventListener('keydown', (e) => {
            const active = document.activeElement;
            if (e.key === 'Escape' || e.key === 'Back' || e.key === 'BrowserBack') {
                closePlayer();
            }
        });
    </script>
</body>
</html>
