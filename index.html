<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCL Premium Stream</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent: #e50914;
            --card-bg: #1a1a1a;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* Header & Input Bereich */
        .header {
            padding: 40px;
            background: linear-gradient(to bottom, #111, transparent);
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        input {
            background: #222;
            border: 2px solid #333;
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        button:focus { outline: 3px solid white; transform: scale(1.05); }

        /* Content Bereich */
        .container { padding: 0 40px 40px 40px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 10px;
            overflow: hidden;
            border: 3px solid transparent;
            transition: 0.3s;
        }

        .card:focus {
            border-color: var(--accent);
            transform: scale(1.1);
            outline: none;
        }

        .card img { width: 100%; height: 280px; object-fit: cover; }

        /* Fullscreen Player */
        #player-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000;
        }

        .back-btn {
            position: absolute; top: 20px; left: 20px;
            z-index: 1001; background: rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

<div class="header">
    <h1>TCL Premium Cinema</h1>
    
    <div class="input-group">
        <input type="text" id="tmdb-input" placeholder="TMDB Link oder ID (z.B. 79744)" style="width: 400px;" tabindex="1">
        <input type="number" id="season-input" placeholder="St." style="width: 70px;" tabindex="2">
        <input type="number" id="episode-input" placeholder="Ep." style="width: 70px;" tabindex="3">
        <button id="play-btn" onclick="handleStart()" tabindex="4">ABSPIELEN</button>
    </div>
</div>

<div class="container">
    <h3>Zuletzt gesehen / Favoriten</h3>
    <div class="grid" id="movie-grid">
        <div class="card" tabindex="5" onclick="quickPlay('79744', '8', '1')">
            <img src="https://www.themoviedb.org/t/p/w500/iS9UpeR6T9R88T6A6vY8j9v8j.jpg">
            <div style="padding: 10px; text-align: center;">The Rookie (S8)</div>
        </div>
    </div>
</div>

<div id="player-overlay">
    <button class="back-btn" onclick="closePlayer()">← ZURÜCK</button>
    <iframe id="main-player" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>
</div>

<script>
    const COLOR = "e50914";

    function handleStart() {
        const input = document.getElementById('tmdb-input').value;
        const s = document.getElementById('season-input').value;
        const e = document.getElementById('episode-input').value;

        let finalUrl = "";

        // Logik: Ist es ein TMDB-Link?
        if (input.includes("themoviedb.org")) {
            finalUrl = extractFromUrl(input, s, e);
        } else {
            // Logik: Es ist eine reine ID
            if (s && e) {
                // TV Serie
                finalUrl = `https://www.vidking.net/embed/tv/${input}/${s}/${e}?color=${COLOR}&nextEpisode=true&episodeSelector=true&autoPlay=true`;
            } else {
                // Film
                finalUrl = `https://www.vidking.net/embed/movie/${input}?color=${COLOR}&autoPlay=true`;
            }
        }

        if (finalUrl) openPlayer(finalUrl);
    }

    function extractFromUrl(url, s, e) {
        // Extrahiert ID aus Link
        const idMatch = url.match(/\/(tv|movie)\/(\d+)/);
        if (!idMatch) return null;

        const type = idMatch[1];
        const id = idMatch[2];

        if (type === "tv") {
            // Check ob Staffel/Folge im Link sind, sonst nimm die manuellen Inputs
            const urlParts = url.match(/\/season\/(\d+)(?:\/episode\/(\d+))?/);
            const finalS = (urlParts ? urlParts[1] : s) || "1";
            const finalE = (urlParts ? urlParts[2] : e) || "1";
            return `https://www.vidking.net/embed/tv/${id}/${finalS}/${finalE}?color=${COLOR}&nextEpisode=true&episodeSelector=true&autoPlay=true`;
        } else {
            return `https://www.vidking.net/embed/movie/${id}?color=${COLOR}&autoPlay=true`;
        }
    }

    function quickPlay(id, s, e) {
        let url = s ? `https://www.vidking.net/embed/tv/${id}/${s}/${e}?color=${COLOR}&autoPlay=true` 
                    : `https://www.vidking.net/embed/movie/${id}?color=${COLOR}&autoPlay=true`;
        openPlayer(url);
    }

    function openPlayer(url) {
        document.getElementById('main-player').src = url;
        document.getElementById('player-overlay').style.display = 'block';
    }

    function closePlayer() {
        document.getElementById('main-player').src = "";
        document.getElementById('player-overlay').style.display = 'none';
    }

    // Back-Button Support für Fernbedienung
    window.onkeydown = function(e) {
        if (e.key === "Backspace" || e.key === "Escape") {
            closePlayer();
        }
    };
</script>

</body>
</html>
